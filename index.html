<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.R.C. RESOLUTIONS | REBOOT</title>
    <style>
        body { 
            background: #050505; 
            color: #00d4ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            overflow: hidden;
        }

        .brand-header {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        h1 { 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            font-size: clamp(1.5rem, 5vw, 2.5rem); 
            border-right: 4px solid #00d4ff; 
            padding-right: 15px; 
            margin: 0;
            animation: blink 0.8s step-end infinite; 
        }

        .caption {
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: lowercase;
            color: #aaaaaa;
            text-align: center;
        }

        .accent-blue {
            color: #00d4ff;
            font-weight: bold;
        }

        @keyframes blink { 
            0%, 100% { border-color: transparent; } 
            50% { border-color: #00d4ff; } 
        }
    </style>
</head>
<body>

    <div class="brand-header">S.T.A.R.C. Technologies</div>
    
    <h1>SYSTEMS REBOOTING</h1>

    <div class="caption">
        starc technologies coming back with <span class="accent-blue">brainstorm solutions</span>
    </div>

</body>
</html>
